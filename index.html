<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de personagem</title>
    <link rel="stylesheet" href="style.css" class="css">
</head>
<body>
    <header class= "topo">
        <section class="conteiner-topo">
            <div>
                <p>Nome do Personagem</p>
                <input type="text">
            </div>
            <div>
                <p>Nome do jogador</p>
                <input type="text">
            </div>
            <div>
                <p>Pontos de XP</p>
                <input type="text">
            </div>
            <div>
                <p>Raça</p>
                <input type="text">
            </div>
            <div>
                <p>Classe</p>
                <input type="text" id="Classe">
            </div>
            <div>
                <p>Alinhamento</p>
                <input type="text">
            </div>
        </section>
    </header>
    <main class="conteiner-conteudo-principal">
        <section class="sessao-conteudo-principal">
            <div class="conteiner-modificadores">
            
                <div>
                    <p>FOR</p>
                    <input type="text">
                </div>
                <div>
                    <p>DES</p>
                    <input type="text">
                </div>
                <div>
                    <p>CON</p>
                    <input type="text">
                </div>
                <div>
                    <p>INT</p>
                    <input type="text">
                </div>
                <div>
                    <p>SAB</p>
                    <input type="text">
                </div>
                <div>
                    <p>CAR</p>
                    <input type="text">
                </div>
            </div>
           <div class="conteiner-vdv-img">
            <div class="conteiner-vdv">
                <div>
                    <p>Vida</p>
                    <input type="text">
                </div>
                <div>
                    <p>Defesa</p>
                    <input type="text">
                </div>
                <div>
                    <p>Velocidade</p>
                    <input type="text">
                </div>
            </div>
            <div class="conteiner-img">
                <img src="Personagens/HP.png" alt="" id="img">
            </div>
           </div> 
           <div class="conteiner-biografia">
            <h2>Biografia</h2>
                <textarea name="" id="" cols="30" rows="25"></textarea></h2>
           </div>
        </section>
        <section class="sessao-conteudo-secundario">
            <div class="conteiner-equipamento">
                <h2>Equipamentos</h2>
                <textarea cols="30" rows="10" name="cols" id=""></textarea>
            </div>            
            <div class="conteiner-caracteristicas">
                <h2>Caracteristicas</h2>
                <textarea cols="30" rows="10" name="30" id=""></textarea>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
